
# =======================================================================
# 1. PENAMAAN SKENARIO DINAMIS (SANGAT PENTING)
# =======================================================================
# Menggabungkan nama Router dan Seed agar setiap dari 6 run memiliki 
# nama skenario (dan nama file report) yang unik.
Scenario.name = %%Group.router%%_Seed%%MovementModel.rngSeed%%

# =======================================================================
# 2. PENGATURAN VARIASI BATCH (ROUTER & SEED)
# =======================================================================
# Kita gunakan 2 jenis protokol routing (berlaku default untuk semua grup)
Group.router = [DecisionEngineRouter; DecisionEngineRouter]
DecisionEngineRouter.decisionEngine = [decisionengine.SnWDecisionEngine; decisionengine.SnFDecisionEngine]
DecisionEngineRouter.nrofCopies = 6

# Kita gunakan 3 variasi Seed untuk Movement (Pergerakan Node)
MovementModel.rngSeed = [1234; 5678; 9012]

# (Trik Master): Agar seed pembuatan pesan/router juga ikut berubah dan 
# selaras dengan seed pergerakan, kita "copy" nilainya menggunakan macro.
MessageRouter.rngSeed = %%MovementModel.rngSeed%%

# =======================================================================
# 3. PENGATURAN GRUP (PEMBAGIAN NODE)
# =======================================================================
# Menentukan bahwa ada 2 grup di dalam simulasi ini
Scenario.nrofHostGroups = 2

# ----- GRUP 1 -----
Group1.groupID = G1
Group1.nrofHosts = 50
# Anda bisa menambahkan spesifikasi khusus untuk Grup 1 di sini
# Contoh: Group1.movementModel = ShortestPathMapBasedMovement
# Contoh: Group1.transmitRange = 10
# Contoh: Group1.transmitSpeed = 250k

# ----- GRUP 2 -----
Group2.groupID = G2
Group2.nrofHosts = 150
# Anda bisa menambahkan spesifikasi khusus untuk Grup 2 di sini
# Contoh: Group2.movementModel = RandomWaypoint
# Contoh: Group2.transmitRange = 10
# Contoh: Group2.transmitSpeed = 250k

# =======================================================================
# 4. PENGATURAN REPORT
# =======================================================================
Report.reportDir = reports/
Report.nrofReports = 3

# Report 1: Untuk melihat statistik umum (Relay, Drop, Delivery Ratio)
Report.report1 = MessageStatsReport

# Report 2: Untuk melihat probabilitas pengiriman seiring berjalannya waktu
Report.report2 = DroppedPerNodePerIntervalReport

# Report 3: Untuk menganalisis jarak dan waktu tunda (delay) pesan
Report.report3 = DistanceDelayReport

# =======================================================================
# 5. PENGATURAN LAINNYA
# =======================================================================
Scenario.simulateConnections = true
Scenario.updateInterval = 0.1
Scenario.endTime = 43200 